name: Build & Deploy Bookly MY
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: |
          dart analyze lib > analyze.log 2>&1 || true
          cat analyze.log
          if grep -q '  error ' analyze.log; then
            echo "::error::Analysis found errors"
            exit 1
          fi
          echo "::notice::Analysis passed (warnings/infos only)"

      - name: Test
        run: flutter test

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > android/app/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/bookly_my.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storeFile=bookly_my.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          EOF

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/flutter-apk/app-release.aab
