plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// 仅在 key.properties 存在时加载签名配置（CI/开发阶段可能没有）
def keystorePropertiesFile = rootProject.file('key.properties')
def hasKeystore = keystorePropertiesFile.exists()

android {
    namespace "com.bookly.my"

    compileSdk 36
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    signingConfigs {
        release {
            if (hasKeystore) {
                def p = new Properties()
                keystorePropertiesFile.withReader('UTF-8') { p.load(it) }
                keyAlias      p['keyAlias']
                keyPassword   p['keyPassword']
                storeFile     file(p['storeFile'])
                storePassword p['storePassword']
            }
        }
    }

    // === 解决 16 KB 页面对齐的核心配置 ===
    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }
    // ===================================

    defaultConfig {
        applicationId "com.bookly.my"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        manifestPlaceholders += [supabaseRedirectScheme: "io.supabase.booklymy"]
    }

    buildTypes {
        release {
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

apply plugin: 'com.google.gms.google-services'
