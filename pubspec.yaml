name: bookly_my
description: Bookly MY - Malaysia Business Accounting App
publish_to: none
version: 1.0.0+6

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State
  provider: ^6.1.2

  # Local DB
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Network & Cloud
  http: ^1.2.2
  supabase_flutter: ^2.6.0

  # UI / Charts
  fl_chart: ^0.69.0

  # Signature pad
  signature: ^5.4.1

  # Image
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # PDF & Print
  pdf: ^3.11.1
  printing: ^5.13.2

  # Share
  share_plus: ^10.0.2

  # Monetization
  purchases_flutter: ^8.0.0
  google_mobile_ads: ^5.1.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  excel: ^4.0.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/fonts/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf

dependency_overrides:
  app_links: 6.3.2

flutter_icons:
  android: true
  ios: false                                     
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"        
  adaptive_icon_foreground: "assets/icon.png"
